<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Slots</title>
  <link rel="stylesheet" href="./css/available-slots.css">
  <script defer src="./js/available-slots.js"></script>
</head>
<body>
  <header class="navbar">
    <div class="logo">SmartPark Solutions</div>
    <nav class="nav-links">
      <a href="../case2/index.html">Home</a>
      <a href="../case2/index.html#contact">Contact</a>
    </nav>
  </header>

  <section class="slots-section">
    <h1>Available Parking Slots</h1>
    <p>Choose your slot and confirm booking.</p>
    <div id="floorsContainer">
      <!-- Floors and slots will be dynamically added here -->
    </div>

  <!-- Popup Confirmation -->
  <div class="popup" id="popup">

      <h2>Slot Confirmed ✅</h2>
      <p id="popupMessage">Your slot has been booked successfully.</p>
      <button id="closePopup">OK</button>
    </div>
  </div>
</body>
