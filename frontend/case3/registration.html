<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Registration</title>
  <link rel="stylesheet" href="registration.css">
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SmartParking</a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="../case2/index.html#home">Home</a>
        <a href="../case2/index.html#how-it-works">How it Works</a>
        <a href="../case2/index.html#contact">Contact</a>
        <a href="../case2/index.html#about">About</a>
        <a href="/frontend/index.html" class="btn-primary">Subscribed Users</a>
      </nav>
    </div>
  </header>

  <!-- Registration Form Section -->
  <main class="container page-content">
    <h2 class="page-title">Subscribe for Parking</h2>
    <div class="card">
      <form id="registrationForm">
        <label for="name">Name</label>
        <input type="text" id="name" required>

        <label for="age">Age</label>
        <input type="number" id="age" required min="18">

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="Enter 10-digit number">

        <label for="vehicle">Vehicle Number</label>
        <input type="text" id="vehicle" required>

        <label for="package">Package</label>
        <select id="package" required>
          <option value="">Select Package</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
          <option value="yearly">Yearly</option>
        </select>

        <button type="submit" class="btn-primary">Pay Later</button>
      </form>
    </div>

    <!-- ✅ Added Payment Info Message -->
    <p class="payment-info">
      💡 <strong>Note:</strong> Payment can be completed anytime before half of your subscription period ends.
    </p>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-content">
      <p>&copy; 2025 SmartParking. All rights reserved.</p>
    </div>
  </footer>

  <script src="registration.js"></script>
</body>
</html>
